name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.11
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run typecheck
      - run: bun run lint
